<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <title>RMA Game</title>
</head>
<body>
    <!--Der Canvas, auf dem das Spiel gerendert wird-->
    <div id="game-container"></div>

    <!--Einbinden der Phaser-Bibliothek-->
    <script src="js/phaser.js"></script>

    <!--Einbinden der einzelnen Szenen-->
    <script src="js/scenes/PreloadScene.js"></script>
    <script src="js/scenes/StartScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/LevelScene.js"></script>

    <!--Oberklasse Modal-->
    <script src="js/scenes/Modal.js"></script>
    <!--Unterklassen Modal-->
    <script src="js/scenes/InfoModal.js"></script>
    <script src="js/scenes/ControlModal.js"></script>
    <script src="js/scenes/PauseModal.js"></script>
    <script src="js/scenes/WinModal.js"></script>
    <script src="js/scenes/LooseModal.js"></script>

    <!--Einbinden der Sprites-->
    <script src="js/sprites/Player.js"></script>
    <script src="js/sprites/Bus.js"></script>
    <script src="js/sprites/Sneaker.js"></script>

    <!--Einbinden des Spielkonfigurationsskripts-->
    <script src="js/main.js"></script>

    <!----------Controller-Klassen---------->
    <script src="js/controller/Timer.js"></script>
    <!--Einbinden der Input-Controller Klasse-->
    <script src="js/controller/inputController.js"></script>
</body>
</html>
