<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <title>Jump and Run</title>
</head>
<body>
    <!--Der Canvas, auf dem das Spiel gerendert wird-->
    <div id="game-container"></div>

    <!--Einbinden der Phaser-Bibliothek-->
    <script src="js/phaser.min.js"></script>

    <!--Einbinden der einzelnen Szenen-->
    <script src="js/StartScene.js"></script>
    <script src="js/GameScene.js"></script>
    <script src="js/LevelScene.js"></script>


    <!--Einbinden des Spielkonfigurationsskripts-->
    <script src="js/main.js"></script>

    <div class="centerContainer">
        <button id="startButton">Start</button>
    </div>

    <div class="leftContainer">
        <!--Button zum Anzeigen von Infos-->
        <button id="infoButton">info</button>
        <!--Button zum Anzeigen der Bedienung der Tasten-->
        <button id="controllerButton">Controls</button>
    </div>

    <div class="rightContainer">
        <!--Buttons zum Musik/Sounds Muten-->
        <button id="soundButton">Sound</button>
        <button id="musicButton">Music</button>
    </div>





    <!--Einbinden der Scene-Controller Klasse-->
    <script src="js/sceneController.js"></script>
</body>
</html>
